batch:
  withdrawn:
    cron: "${WITHDRAW_CRON}"
    chunk-size: ${WITHDRAW_CHUNK}
  settlement:
    daily-cron: "${SETTLEMENT_DAILY_CRON}"
    monthly-cron: "${SETTLEMENT_MONTHLY_CRON}"
    enabled: ${SETTLEMENT_BATCH_ENABLED}

  forecast:
    enabled: ${FORECAST_BATCH_ENABLED}
    aggregation-cron: "${FORECAST_AGGREGATION_CRON}"
    forecast-cron: "${FORECAST_PREDICTION_CRON}"
    chunk-size: ${FORECAST_CHUNK_SIZE}
    skip-limit: ${FORECAST_SKIP_LIMIT}
    retry-limit: ${FORECAST_RETRY_LIMIT}
    timeout-minutes: ${FORECAST_TIMEOUT_MINUTES}
    prediction-period-days: ${FORECAST_PREDICTION_DAYS}
    historical-data-days: ${FORECAST_HISTORICAL_DAYS}
    min-sales-data-days: ${FORECAST_MIN_SALES_DAYS}
    moving-average-window: ${FORECAST_MOVING_AVERAGE}
    cleanup-old-data-days: ${FORECAST_CLEANUP_DAYS}

spring:
  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 20MB
  langchain4j:
    google-ai-gemini:
      api-key: ${API_KEY}
      model-name: gemini-2.0-flash
  batch:
    jdbc:
      initialize-schema: always

  session:
    store-type: redis
    timeout: 30m

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        mime:
          charset: UTF-8
    default-encoding: UTF-8

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-timeout: 30000
      pool-name: HikariPool

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - profile

          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            authorization-grant-type: authorization_code
            scope:
              - name
            client-name: Naver
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - profile_nickname
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
    mongodb:
      uri: ${MONGO_URL}
      database: ${MONGO_DATABASE}
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
    listener:
      simple:
        acknowledge-mode: manual
        retry:
          enabled: true
          initial-interval: 1000
          multiplier: 2
          max-attempts: 3
          max-interval: 10000
        default-requeue-rejected: false
        concurrency: 1
        max-concurrency: 5
        prefetch: 1

mybatis:
  type-aliases-package: com.team5.catdogeats.mybatis

jwt:
  secret: ${JWT_SECRET_KEY}
  expiration: ${JWT_EXPIRATION}

  cookie:
    secure: ${JWT_COOKIE_SECURE}
    same-site: ${JWT_COOKIE_SAME_SITE}
    http-only: ${JWT_COOKIE_HTTP_ONLY}
    max-age: ${JWT_COOKIE_MAX_AGE}
    domain: ${JWT_COOKIE_DOMAIN}
    path: ${JWT_COOKIE_PATH}

logging:
  level:
    com.team5.catdogeats: DEBUG
    org:
      springframework:
        security: DEBUG
        oauth2: DEBUG

toss:
  payments:
    client-key: ${TOSS_CLIENT_KEY}
    secret-key: ${TOSS_SECRET_KEY}
    success-url: ${TOSS_SUCCESS_URL}
    fail-url: ${TOSS_FAIL_URL}
    api:
      base-url: https://api.tosspayments.com/
      version: "2022-11-16"
admin:
  super:
    email: ${ADMIN_SUPER_EMAIL}
    name: ${ADMIN_SUPER_NAME}
    password: ${ADMIN_SUPER_PASSWORD}
  invitation:
    expiration-hours: ${ADMIN_INVITATION_EXPIRATION_HOURS}
  redis:
    verification-code-prefix: ${ADMIN_REDIS_VERIFICATION_PREFIX}
  session:
    key: ${ADMIN_SESSION_KEY}
app:
  admin:
    base-url: ${APP_BASE_URL}
websocket:
  endpoint: /v1/users/chat
outbox:
  processing:
    mode: ${OUTBOX_PROCESSING_MODE}
debezium:
  database:
    hostname: ${DEBEZIUM_DATABASE_HOSTNAME}
    port: ${DEBEZIUM_DATABASE_PORT}
    username: ${DEBEZIUM_DATABASE_USERNAME}
    password: ${DEBEZIUM_DATABASE_PASSWORD}
    dbname: ${DEBEZIUM_DATABASE_DBNAME}
    server-name: ${DEBEZIUM_DATABASE_SERVER_NAME}
  connector:
    slot-name: ${DEBEZIUM_CONNECTOR_SLOT_NAME}
    publication-name: ${DEBEZIUM_CONNECTOR_PUBLICATION_NAME}
    plugin-name: ${DEBEZIUM_CONNECTOR_PLUGIN_NAME}
    table-include-list: ${DEBEZIUM_CONNECTOR_TABLE_INCLUDE_LIST}
    poll-interval-ms: ${DEBEZIUM_CONNECTOR_POLL_INTERVAL_MS}
  offset:
    storage-file: ${DEBEZIUM_OFFSET_STORAGE_FILE}
url:
  success: ${URL_SUCCESS}
  fail: ${URL_FAIL}
  duplicate: ${URL_DUPLICATE}
  logout: ${URL_LOGOUT}
  login: ${URL_LOGIN}
  withdrawn: ${URL_WITHDRAWN}
  role-selection: ${URL_ROLE_SELECTION}
logistics:
  api:
    url: ${LOGISTICS_API_URL}

cloud:
  r2:
    access-key: ${R2_ACCESS_KEY}
    secret-key: ${R2_SECRET_KEY}
    bucket: ${R2_BUCKET_NAME}
    endpoint: ${R2_ENDPOINT}
    domain: ${R2_DOMAIN}

  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}
    region:
      static: ${S3_REGION}
    s3:
      bucket: ${S3_BUCKET_NAME}
    cloudfront:
      domain: ${CLOUD_FRONT_DOMAIN_NAME}

management:
  endpoints:
    web:
      exposure:
        include: prometheus, health
  metrics:
    enable:
      all: true

