version: '3.8'
services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  app:
    image: docker.io/euegenechoi/aibe1-finalproject-todayscommit_be:latest
    ports:
      - "8080:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      # žĄúŽ≤Ą žĄ§ž†ē
      - PORT=${PORT:8080}
      - PROFILE=${PROFILE:prod}

      # ŽįįžĻė ÍīÄŽ†® žĄ§ž†ē
      - WITHDRAW_CRON=${WITHDRAW_CRON:0 30 2 * * ?}
      - WITHDRAW_CHUNK=${WITHDRAW_CHUNK:1000}
      - SETTLEMENT_DAILY_CRON=${SETTLEMENT_DAILY_CRON:0 0 2 * * ?}
      - SETTLEMENT_MONTHLY_CRON=${SETTLEMENT_MONTHLY_CRON:0 0 4 1 * ?}
      - SETTLEMENT_BATCH_ENABLED=${SETTLEMENT_BATCH_ENABLED:true}
      - FORECAST_BATCH_ENABLED=${FORECAST_BATCH_ENABLED:true}
      - FORECAST_AGGREGATION_CRON=${FORECAST_AGGREGATION_CRON:0 0 2 * * ?}
      - FORECAST_PREDICTION_CRON=${FORECAST_PREDICTION_CRON:0 0 3 * * ?}
      - FORECAST_CHUNK_SIZE=${FORECAST_CHUNK_SIZE:100}
      - FORECAST_SKIP_LIMIT=${FORECAST_SKIP_LIMIT:50}
      - FORECAST_RETRY_LIMIT=${FORECAST_RETRY_LIMIT:3}
      - FORECAST_TIMEOUT_MINUTES=${FORECAST_TIMEOUT_MINUTES:120}
      - FORECAST_PREDICTION_DAYS=${FORECAST_PREDICTION_DAYS:7}
      - FORECAST_HISTORICAL_DAYS=${FORECAST_HISTORICAL_DAYS:30}
      - FORECAST_MIN_SALES_DAYS=${FORECAST_MIN_SALES_DAYS:15}
      - FORECAST_MOVING_AVERAGE=${FORECAST_MOVING_AVERAGE:7}
      - FORECAST_CLEANUP_DAYS=${FORECAST_CLEANUP_DAYS:30}

      # ŽćįžĚīŪĄįŽ≤†žĚīžä§ žĄ§ž†ē
      - DB_URL=${DB_URL}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=${DB_HOST}

      # Redis žĄ§ž†ē
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT:14972}
      - REDIS_PASSWORD=${REDIS_PASSWORD}

      # MongoDB žĄ§ž†ē
      - MONGO_URL=${MONGO_URL}
      - MONGO_DATABASE=${MONGO_DATABASE}

      # RabbitMQ žĄ§ž†ē
      - RABBITMQ_HOST=${RABBITMQ_HOST}
      - RABBITMQ_PORT=${RABBITMQ_PORT:5672}
      - RABBITMQ_USERNAME=${RABBITMQ_USERNAME}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}

      # OAuth2 žĄ§ž†ē
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - NAVER_CLIENT_ID=${NAVER_CLIENT_ID}
      - NAVER_CLIENT_SECRET=${NAVER_CLIENT_SECRET}
      - KAKAO_CLIENT_ID=${KAKAO_CLIENT_ID}
      - KAKAO_CLIENT_SECRET=${KAKAO_CLIENT_SECRET}

      # AWS žĄ§ž†ē
      - AWS_ACCESS_KEY=${AWS_ACCESS_KEY}
      - AWS_SECRET_KEY=${AWS_SECRET_KEY}
      - S3_REGION=${S3_REGION}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - CLOUD_FRONT_DOMAIN_NAME=${CLOUD_FRONT_DOMAIN_NAME}

      # JWT žĄ§ž†ē
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_EXPIRATION=${JWT_EXPIRATION:1800000}
      - JWT_COOKIE_SECURE=${JWT_COOKIE_SECURE:true}
      - JWT_COOKIE_SAME_SITE=${JWT_COOKIE_SAME_SITE:None}
      - JWT_COOKIE_HTTP_ONLY=${JWT_COOKIE_HTTP_ONLY:true}
      - JWT_COOKIE_MAX_AGE=${JWT_COOKIE_MAX_AGE:3600}
      - JWT_COOKIE_DOMAIN=${JWT_COOKIE_DOMAIN:.catdogeats.shop}
      - JWT_COOKIE_PATH=${JWT_COOKIE_PATH:/}

      # ŪÜ†žä§ ŪéėžĚīŽ®ľžł† žĄ§ž†ē
      - TOSS_CLIENT_KEY=${TOSS_CLIENT_KEY}
      - TOSS_SECRET_KEY=${TOSS_SECRET_KEY}
      - TOSS_SUCCESS_URL=${TOSS_SUCCESS_URL:https://backend.catdogeats.shop/v1/buyers/payments/success}
      - TOSS_FAIL_URL=${TOSS_FAIL_URL:https://backend.catdogeats.shop/v1/buyers/payments/fail}

      # ÍīÄŽ¶¨žěź žĄ§ž†ē
      - ADMIN_SUPER_EMAIL=${ADMIN_SUPER_EMAIL}
      - ADMIN_SUPER_NAME=${ADMIN_SUPER_NAME}
      - ADMIN_SUPER_PASSWORD=${ADMIN_SUPER_PASSWORD}
      - ADMIN_INVITATION_EXPIRATION_HOURS=${ADMIN_INVITATION_EXPIRATION_HOURS:1}
      - ADMIN_REDIS_VERIFICATION_PREFIX=${ADMIN_REDIS_VERIFICATION_PREFIX:admin:verification:}
      - ADMIN_SESSION_KEY=${ADMIN_SESSION_KEY:ADMIN_USER}

      # žĚīŽ©ĒžĚľ žĄ§ž†ē
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}

      # URL žĄ§ž†ē
      - URL_SUCCESS=${URL_SUCCESS:https://www.catdogeats.shop}
      - URL_FAIL=${URL_FAIL:https://www.catdogeats.shop/login}
      - URL_LOGOUT=${URL_LOGOUT:https://www.catdogeats.shop/}
      - URL_DUPLICATE=${URL_DUPLICATE:https://www.catdogeats.shop/}
      - URL_WITHDRAWN=${URL_WITHDRAWN:https://www.catdogeats.shop/withdrawn}
      - URL_LOGIN=${URL_LOGIN:https://www.catdogeats.shop}
      - URL_ROLE_SELECTION=${URL_ROLE_SELECTION:https://www.catdogeats.shop/role-selection}

      # ÍłįŪÉÄ žĄ§ž†ē
      - LOGISTICS_API_URL=${LOGISTICS_API_URL}
      - APP_BASE_URL=${APP_BASE_URL}

      # Debezium žĄ§ž†ē
      - DEBEZIUM_DATABASE_HOSTNAME=${DB_HOST}
      - DEBEZIUM_DATABASE_PORT=${DEBEZIUM_DATABASE_PORT:5432}
      - DEBEZIUM_DATABASE_USERNAME=${DB_USER}
      - DEBEZIUM_DATABASE_PASSWORD=${DB_PASSWORD}
      - DEBEZIUM_DATABASE_DBNAME=${DEBEZIUM_DATABASE_DBNAME:catdogeats}
      - DEBEZIUM_DATABASE_SERVER_NAME=${DEBEZIUM_DATABASE_SERVER_NAME:catdogeats}
      - DEBEZIUM_CONNECTOR_SLOT_NAME=${DEBEZIUM_CONNECTOR_SLOT_NAME:debezium_slot}
      - DEBEZIUM_CONNECTOR_PUBLICATION_NAME=${DEBEZIUM_CONNECTOR_PUBLICATION_NAME:debezium_publication}
      - DEBEZIUM_CONNECTOR_PLUGIN_NAME=${DEBEZIUM_CONNECTOR_PLUGIN_NAME:pgoutput}
      - DEBEZIUM_CONNECTOR_TABLE_INCLUDE_LIST=${DEBEZIUM_CONNECTOR_TABLE_INCLUDE_LIST:public.outbox_messages}
      - DEBEZIUM_CONNECTOR_POLL_INTERVAL_MS=${DEBEZIUM_CONNECTOR_POLL_INTERVAL_MS:5000}
      - DEBEZIUM_OFFSET_STORAGE_FILE=${DEBEZIUM_OFFSET_STORAGE_FILE:./data/debezium-offsets.txt}

      # Outbox žĄ§ž†ē
      - OUTBOX_PROCESSING_MODE=${OUTBOX_PROCESSING_MODE:cdc}

      # Gemini AI žĄ§ž†ē
      - API_KEY=${API_KEY}
      - GEMINI_MODEL_NAME=${GEMINI_MODEL_NAME:gemini-2.0-flash}
    restart: unless-stopped