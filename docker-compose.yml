version: '3.8'
services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  app:
    image: docker.io/euegenechoi/aibe1-finalproject-todayscommit_be:latest
    ports:
      - "8080:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      # 서버 설정
      PORT: ${PORT}
      PROFILE: ${PROFILE}

      # 배치 관련 설정
      WITHDRAW_CRON: ${WITHDRAW_CRON}
      WITHDRAW_CHUNK: ${WITHDRAW_CHUNK}
      SETTLEMENT_DAILY_CRON: ${SETTLEMENT_DAILY_CRON}
      SETTLEMENT_MONTHLY_CRON: ${SETTLEMENT_MONTHLY_CRON}
      SETTLEMENT_BATCH_ENABLED: ${SETTLEMENT_BATCH_ENABLED}
      FORECAST_BATCH_ENABLED: ${FORECAST_BATCH_ENABLED}
      FORECAST_AGGREGATION_CRON: ${FORECAST_AGGREGATION_CRON}
      FORECAST_PREDICTION_CRON: ${FORECAST_PREDICTION_CRON}
      FORECAST_CHUNK_SIZE: ${FORECAST_CHUNK_SIZE}
      FORECAST_SKIP_LIMIT: ${FORECAST_SKIP_LIMIT}
      FORECAST_RETRY_LIMIT: ${FORECAST_RETRY_LIMIT}
      FORECAST_TIMEOUT_MINUTES: ${FORECAST_TIMEOUT_MINUTES}
      FORECAST_PREDICTION_DAYS: ${FORECAST_PREDICTION_DAYS}
      FORECAST_HISTORICAL_DAYS: ${FORECAST_HISTORICAL_DAYS}
      FORECAST_MIN_SALES_DAYS: ${FORECAST_MIN_SALES_DAYS}
      FORECAST_MOVING_AVERAGE: ${FORECAST_MOVING_AVERAGE}
      FORECAST_CLEANUP_DAYS: ${FORECAST_CLEANUP_DAYS}

      # 데이터베이스 설정
      DB_URL: ${DB_URL}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: ${DB_HOST}

      # Redis 설정
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      # MongoDB 설정
      MONGO_URL: ${MONGO_URL}
      MONGO_DATABASE: ${MONGO_DATABASE}

      # RabbitMQ 클라이언트 설정
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}

      # OAuth2 설정
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      NAVER_CLIENT_ID: ${NAVER_CLIENT_ID}
      NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET}
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET}

      # AWS 설정
      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY}
      S3_REGION: ${S3_REGION}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      CLOUD_FRONT_DOMAIN_NAME: ${CLOUD_FRONT_DOMAIN_NAME}

      # JWT 설정
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      JWT_COOKIE_SECURE: ${JWT_COOKIE_SECURE}
      JWT_COOKIE_SAME_SITE: ${JWT_COOKIE_SAME_SITE}
      JWT_COOKIE_HTTP_ONLY: ${JWT_COOKIE_HTTP_ONLY}
      JWT_COOKIE_MAX_AGE: ${JWT_COOKIE_MAX_AGE}
      JWT_COOKIE_DOMAIN: ${JWT_COOKIE_DOMAIN}
      JWT_COOKIE_PATH: ${JWT_COOKIE_PATH}

      # Toss Payments 설정
      TOSS_CLIENT_KEY: ${TOSS_CLIENT_KEY}
      TOSS_SECRET_KEY: ${TOSS_SECRET_KEY}
      TOSS_SUCCESS_URL: ${TOSS_SUCCESS_URL}
      TOSS_FAIL_URL: ${TOSS_FAIL_URL}

      # 관리자 설정
      ADMIN_SUPER_EMAIL: ${ADMIN_SUPER_EMAIL}
      ADMIN_SUPER_NAME: ${ADMIN_SUPER_NAME}
      ADMIN_SUPER_PASSWORD: ${ADMIN_SUPER_PASSWORD}
      ADMIN_INVITATION_EXPIRATION_HOURS: ${ADMIN_INVITATION_EXPIRATION_HOURS}
      ADMIN_REDIS_VERIFICATION_PREFIX: ${ADMIN_REDIS_VERIFICATION_PREFIX}
      ADMIN_SESSION_KEY: ${ADMIN_SESSION_KEY}

      # 이메일 설정
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}

      # URL 설정
      URL_SUCCESS: ${URL_SUCCESS}
      URL_FAIL: ${URL_FAIL}
      URL_LOGOUT: ${URL_LOGOUT}
      URL_DUPLICATE: ${URL_DUPLICATE}
      URL_WITHDRAWN: ${URL_WITHDRAWN}
      URL_LOGIN: ${URL_LOGIN}
      URL_ROLE_SELECTION: ${URL_ROLE_SELECTION}

      # 기타
      LOGISTICS_API_URL: ${LOGISTICS_API_URL}
      APP_BASE_URL: ${APP_BASE_URL}

      # Debezium 설정
      DEBEZIUM_DATABASE_HOSTNAME: ${DEBEZIUM_DATABASE_HOSTNAME}
      DEBEZIUM_DATABASE_PORT: ${DEBEZIUM_DATABASE_PORT}
      DEBEZIUM_DATABASE_USERNAME: ${DEBEZIUM_DATABASE_USERNAME}
      DEBEZIUM_DATABASE_PASSWORD: ${DEBEZIUM_DATABASE_PASSWORD}
      DEBEZIUM_DATABASE_DBNAME: ${DEBEZIUM_DATABASE_DBNAME}
      DEBEZIUM_DATABASE_SERVER_NAME: ${DEBEZIUM_DATABASE_SERVER_NAME}
      DEBEZIUM_CONNECTOR_SLOT_NAME: ${DEBEZIUM_CONNECTOR_SLOT_NAME}
      DEBEZIUM_CONNECTOR_PUBLICATION_NAME: ${DEBEZIUM_CONNECTOR_PUBLICATION_NAME}
      DEBEZIUM_CONNECTOR_PLUGIN_NAME: ${DEBEZIUM_CONNECTOR_PLUGIN_NAME}
      DEBEZIUM_CONNECTOR_TABLE_INCLUDE_LIST: ${DEBEZIUM_CONNECTOR_TABLE_INCLUDE_LIST}
      DEBEZIUM_CONNECTOR_POLL_INTERVAL_MS: ${DEBEZIUM_CONNECTOR_POLL_INTERVAL_MS}
      DEBEZIUM_OFFSET_STORAGE_FILE: ${DEBEZIUM_OFFSET_STORAGE_FILE}

      # Outbox
      OUTBOX_PROCESSING_MODE: ${OUTBOX_PROCESSING_MODE}

      # Gemini AI 설정
      API_KEY: ${API_KEY}
      GEMINI_MODEL_NAME: ${GEMINI_MODEL_NAME}

    restart: unless-stopped
