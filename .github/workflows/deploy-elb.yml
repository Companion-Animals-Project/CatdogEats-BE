name: CI/CD Pipeline

on:
  push:
    branches:
      - feat/cicd/91
      - develop
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    outputs:
      IMAGE: ${{ steps.prepare-tags.outputs.image }}
      IMAGE_LATEST: ${{ steps.prepare-tags.outputs.image_latest }}
      CACHE_TAG: ${{ steps.prepare-tags.outputs.cache_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build JAR
        run: ./gradlew clean bootJar

      - name: Set up QEMU (optional, for multi-arch)
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        with:
          driver: docker-container

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Tags & Cache Tag
        id: prepare-tags
        run: |
          REPO_LOWER=${GITHUB_REPOSITORY,,}
          IMAGE="ghcr.io/${REPO_LOWER}:${GITHUB_SHA}"
          IMAGE_LATEST="ghcr.io/${REPO_LOWER}:latest"
          CACHE_TAG="ghcr.io/${REPO_LOWER}:cache"
          echo "image=${IMAGE}"             >> $GITHUB_OUTPUT
          echo "image_latest=${IMAGE_LATEST}" >> $GITHUB_OUTPUT
          echo "cache_tag=${CACHE_TAG}"     >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.prepare-tags.outputs.image }}
            ${{ steps.prepare-tags.outputs.image_latest }}
          build-args: |
            JAR_FILE=build/libs/*.jar
          cache-from: type=registry,ref=${{ steps.prepare-tags.outputs.cache_tag }}
          cache-to:   type=registry,ref=${{ steps.prepare-tags.outputs.cache_tag }},mode=max

  deploy-to-eb:
    needs: build-and-publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Dockerrun.aws.json
        run: |
          # build-and-publish 잡에서 생성된 이미지 태그를 가져옵니다.
          # 이 태그는 각 빌드마다 고유한 커밋 SHA를 포함합니다.
          IMAGE_NAME="${{ needs.build-and-publish.outputs.IMAGE }}"
          
          # Dockerrun.aws.json 파일을 동적으로 생성합니다.
          # Image.Name 필드에 빌드된 Docker 이미지의 전체 경로와 태그를 삽입합니다.
          cat <<EOF > Dockerrun.aws.json
          {
            "AWSEBDockerrunVersion": 1,
            "Image": {
              "Name": "${IMAGE_NAME}",
              "Update": "true"
            },
            "Ports": [
              {
                "ContainerPort": "8080"
              }
            ]
          }
          EOF
          echo "Generated Dockerrun.aws.json:"
          cat Dockerrun.aws.json

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v20
        with:
          aws_access_key:    ${{ secrets.AWS_ACTION_ACCESS_KEY_ID }}
          aws_secret_key:    ${{ secrets.AWS_ACTION_SECRET_ACCESS_KEY }}
          region:            ap-northeast-2
          application_name:  aibe1-team05
          environment_name:  aibe1-team05-env
          version_label:     deploy-${{ github.run_number }}
          file: Dockerrun.aws.json
          wait_for_environment_recovery: false
