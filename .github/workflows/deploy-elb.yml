name: CI/CD Pipeline

on:
  push:
    branches:
      - feat/cicd/91
      - develop
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    outputs:
      IMAGE: ${{ steps.prepare-tags.outputs.image }}
      IMAGE_LATEST: ${{ steps.prepare-tags.outputs.image_latest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build JAR
        run: ./gradlew clean bootJar

      - name: Set up QEMU (optional, for multi-arch)
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        with:
          driver: docker-container

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 리포지토리명 소문자 변환 & 태그 변수 설정
        run: |
            REPO_LOWER=${GITHUB_REPOSITORY,,}
            echo "REPO_LOWER=${REPO_LOWER}"            >> $GITHUB_ENV
            echo "IMAGE=ghcr.io/${REPO_LOWER}:${GITHUB_SHA}"     >> $GITHUB_ENV
            echo "IMAGE_LATEST=ghcr.io/${REPO_LOWER}:latest"     >> $GITHUB_ENV

      - name: Build and push Docker image (with remote cache)
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}
            ${{ env.IMAGE_LATEST }}
          build-args: |
            JAR_FILE=build/libs/*.jar
          cache-from: type=registry,ref=ghcr.io/${{ env.REPO_LOWER }}:cache
          cache-to: type=registry,ref=ghcr.io/${{ env.REPO_LOWER }}:cache,mode=max

  deploy-to-eb:
    needs: build-and-publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Dockerrun
        run: |
          cat > Dockerrun.aws.json <<EOF
          {
            "AWSEBDockerrunVersion": 2,
            "image": {
              "name": "${{ needs.build-and-publish.outputs.IMAGE_LATEST }}",
              "update": true
            },
            "ports": [{"containerPort": 8080}],
            "logging": "/var/log/nginx"
          }
          EOF

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v20
        with:
          aws_access_key:    ${{ secrets.AWS_ACTION_ACCESS_KEY_ID }}
          aws_secret_key:    ${{ secrets.AWS_ACTION_SECRET_ACCESS_KEY }}
          region:            ap-northeast-2
          application_name:  aibe1-team05
          environment_name:  aibe1-team05-env
          version_label:     deploy-${{ github.run_number }}
          deployment_package: Dockerrun.aws.json
          wait_for_environment_recovery: 120
