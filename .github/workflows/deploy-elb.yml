name: CI/CD Pipeline

on:
  push:
    branches:
      - refactor/cicd/131
      - develop
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    outputs:
      IMAGE: ${{ steps.prepare-tags.outputs.image }}
      IMAGE_LATEST: ${{ steps.prepare-tags.outputs.image_latest }}
      CACHE_TAG: ${{ steps.prepare-tags.outputs.cache_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build JAR
        run: ./gradlew clean bootJar

      - name: Set up QEMU (optional, for multi-arch)
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        with:
          driver: docker-container

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Prepare Tags & Cache Tag
        id: prepare-tags
        run: |
          REPO_NAME=${GITHUB_REPOSITORY##*/}
          REPO_LOWER=${REPO_NAME,,}
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/${REPO_LOWER}:${GITHUB_SHA}"
          IMAGE_LATEST="${{ secrets.DOCKERHUB_USERNAME }}/${REPO_LOWER}:latest"
          CACHE_TAG="${{ secrets.DOCKERHUB_USERNAME }}/${REPO_LOWER}:cache"
          echo "image=${IMAGE}"           >> $GITHUB_OUTPUT
          echo "image_latest=${IMAGE_LATEST}" >> $GITHUB_OUTPUT
          echo "cache_tag=${CACHE_TAG}"   >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.prepare-tags.outputs.image }}
            ${{ steps.prepare-tags.outputs.image_latest }}
          build-args: |
            JAR_FILE=build/libs/*.jar
          cache-from: type=registry,ref=${{ steps.prepare-tags.outputs.cache_tag }}
          cache-to:   type=registry,ref=${{ steps.prepare-tags.outputs.cache_tag }},mode=max

  deploy-to-ec2:
      needs: build-and-publish
      runs-on: ubuntu-latest

      steps:
        - name: Checkout code
          uses: actions/checkout@v3

        - name: Generate deployment package
          run: |
            mkdir -p deploy/.platform/nginx/conf.d
            cp docker-compose.yml deploy/docker-compose.yml
            cp .platform/nginx/conf.d/*.conf deploy/.platform/nginx/conf.d/
            cd deploy && zip -r deploy.zip .

        - name: Copy deployment files to EC2
          uses: appleboy/scp-action@v0.1.7
          with:
            host: ${{ secrets.EC2_HOST }}
            username: ${{ secrets.EC2_USER }}
            key: ${{ secrets.EC2_SSH_KEY }}
            source: "deploy/deploy.zip"
            target: "/home/${{ secrets.EC2_USER }}/app"

        - name: SSH into EC2 and deploy
          uses: appleboy/ssh-action@v0.1.10
          with:
            host: ${{ secrets.EC2_HOST }}
            username: ${{ secrets.EC2_USER }}
            key: ${{ secrets.EC2_SSH_KEY }}
            script: |
              cd /home/${{ secrets.EC2_USER }}/app
              unzip -o deploy.zip
              docker compose down
              docker compose pull
              docker compose up -d --build
  
